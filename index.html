<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>My Music</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>My Music</h2>
    <p>Playlist</p>
  </div>

  <!-- Main -->
  <div class="main">
    <h2>Viral Playlist</h2>

    <div class="playlist">

      <div class="card" onclick="playSong(0)">
        <img src="https://picsum.photos/200?1">
        <p>Back to Friends</p>
      </div>

      <div class="card" onclick="playSong(1)">
        <img src="https://picsum.photos/200?2">
        <p>From The Start</p>
      </div>

    </div>

    <div class="lyrics" id="lyrics"></div>
  </div>

</div>

<!-- Player Bar -->
<div class="player">

  <div class="info">
    <img id="cover" src="https://picsum.photos/50">
    <div>
      <p id="title">No song</p>
    </div>
  </div>

  <div class="controls">
    <button onclick="togglePlay()">▶</button>
  </div>

  <div class="progress-container" onclick="seek(event)">
    <div class="progress" id="progress"></div>
  </div>

</div>

<iframe id="sc-player" allow="autoplay"></iframe>

<script src="https://w.soundcloud.com/player/api.js"></script>
<script src="script.js"></script>

</body>
</html>
